# Application name
spring.application.name=Monitoring System

# Database connection (Neon PostgreSQL)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (important for Neon serverless)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.keepalive-time=60000

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Server port (Render uses PORT env var)
server.port=${PORT:8080}

# EmailJS Configuration
emailjs.service.id=${EMAILJS_SERVICE_ID}
emailjs.otp.template.id=${EMAILJS_OTP_TEMPLATE_ID}
emailjs.alert.template.id=${EMAILJS_ALERT_TEMPLATE_ID}
emailjs.public.key=${EMAILJS_PUBLIC_KEY}
emailjs.private.key=${EMAILJS_PRIVATE_KEY}
